<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Log skin picking episodes and resistances.">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Groundwork">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Groundwork -- Log</title>
<meta name="theme-color" id="theme-color-meta" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<script>
(function() {
  const stored = localStorage.getItem('gw-theme');
  if (stored === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
</head>
<body>

<div class="auth-screen on" id="auth-screen">
  <div class="auth-card">
    <div class="auth-card-title">Groundwork</div>
    <div class="auth-card-sub">Sign in to log.</div>
    <button class="google-btn" onclick="signInWithGoogle()">Continue with Google</button>
  </div>
</div>

<div id="gw-nav"></div>

<div id="app">
<main class="log-main">

  <div id="log-form">

    <div class="log-header-row anim d1">
      <div class="page-title page-title--flush">Log</div>
      <div class="mode-toggle" role="group" aria-label="Log mode">
        <button class="mode-btn on" id="mode-quick" onclick="setMode('quick')" aria-pressed="true">Quick</button>
        <button class="mode-btn"   id="mode-full"  onclick="setMode('full')"  aria-pressed="false">Full</button>
      </div>
    </div>

    <div class="card anim d2">

      <!-- ====== OUTCOME (top-level, always visible) ====== -->
      <div class="field">
        <label class="field-label">What happened?</label>
        <div class="grid-2" role="group" aria-label="Outcome">
          <button type="button" class="tag outcome-resisted" onclick="selectOutcome('resisted', this)">Resisted</button>
          <button type="button" class="tag outcome-episode" onclick="selectOutcome('picked', this)">Picked</button>
        </div>
      </div>

      <div id="outcome-gated" style="display:none">

        <!-- ====== AWARENESS (picked only) ====== -->
        <div class="field" id="awareness-field" style="display:none">
          <label class="field-label">How did it start?</label>
          <div class="grid-2" role="group" aria-label="Awareness type">
            <button type="button" class="tag" onclick="selectAwareness('Urge first',this)">Urge first</button>
            <button type="button" class="tag" onclick="selectAwareness('Automatic',this)">Automatic</button>
          </div>
        </div>

        <!-- ====== WHERE ON BODY ====== -->
        <div class="field">
          <label class="field-label">Where?</label>
          <div class="body-area-grid" role="group" aria-label="Body area">

            <div class="body-area-group">
              <button type="button" class="tag body-area-parent" onclick="toggleAreaGroup('face',this)">
                Face <span class="area-badge" id="badge-face"></span>
              </button>
              <div class="body-area-sub hidden" id="sub-face">
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Forehead</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Cheeks</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Temples</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Jawline</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Chin</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Nose</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Lips</button>
              </div>
            </div>

            <div class="body-area-group">
              <button type="button" class="tag body-area-parent" onclick="toggleAreaGroup('head',this)">
                Head / Neck <span class="area-badge" id="badge-head"></span>
              </button>
              <div class="body-area-sub hidden" id="sub-head">
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Scalp</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Hairline</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Behind Ears</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Ears</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Neck</button>
              </div>
            </div>

            <div class="body-area-group">
              <button type="button" class="tag body-area-parent" onclick="toggleAreaGroup('arms',this)">
                Arms / Hands <span class="area-badge" id="badge-arms"></span>
              </button>
              <div class="body-area-sub hidden" id="sub-arms">
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Upper Arms</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Forearms</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Wrists</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Hands</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Fingers / Cuticles</button>
              </div>
            </div>

            <div class="body-area-group">
              <button type="button" class="tag body-area-parent" onclick="toggleAreaGroup('torso',this)">
                Torso <span class="area-badge" id="badge-torso"></span>
              </button>
              <div class="body-area-sub hidden" id="sub-torso">
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Chest</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Shoulders</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Abdomen</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Upper Back</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Lower Back</button>
              </div>
            </div>

            <div class="body-area-group">
              <button type="button" class="tag body-area-parent" onclick="toggleAreaGroup('legs',this)">
                Legs <span class="area-badge" id="badge-legs"></span>
              </button>
              <div class="body-area-sub hidden" id="sub-legs">
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Thighs</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Knees</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Shins / Calves</button>
                <button type="button" class="tag" onclick="toggleMulti('where',this)">Feet</button>
              </div>
            </div>

            <button type="button" class="tag tag-other" onclick="showOther('where',this)">Other...</button>
          </div>
          <div class="other-input-wrap" id="other-where">
            <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
              onkeydown="if(event.key==='Enter')confirmOtherVal('where',true,this)"
              onblur="cancelOtherInput('where')">
            <button class="other-confirm" onclick="confirmOtherVal('where',true,this.previousElementSibling)">Add</button>
          </div>
        </div>

        <!-- ====== WHEN ====== -->
        <div class="field">
          <label class="field-label">When</label>
          <div class="grid-2" role="group" aria-label="Timing">
            <button type="button" class="tag on" onclick="selectTiming('now', this)">Right now</button>
            <button type="button" class="tag"    onclick="selectTiming('earlier', this)">Earlier</button>
          </div>
          <div id="time-wrap" class="hidden time-wrap">
            <input type="datetime-local" id="log-time" aria-label="Date and time">
          </div>
        </div>

        <!-- ====== STATE / EMOTION (quick log: single select) ====== -->
        <div class="field">
          <label class="field-label">State</label>
          <div class="grid-auto" role="group" aria-label="Emotional state">
            <button type="button" class="tag" onclick="selectTag('state',this)">Anxious / stressed</button>
            <button type="button" class="tag" onclick="selectTag('state',this)">Restless / bored</button>
            <button type="button" class="tag" onclick="selectTag('state',this)">Zoned out</button>
            <button type="button" class="tag" onclick="selectTag('state',this)">Low / sad</button>
            <button type="button" class="tag" onclick="selectTag('state',this)">Calm / neutral</button>
            <button type="button" class="tag" onclick="selectTag('state',this)">Overwhelmed</button>
            <button type="button" class="tag tag-other" onclick="showOther('state',this)">Other...</button>
          </div>
          <div class="other-input-wrap" id="other-state">
            <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
              onkeydown="if(event.key==='Enter')confirmOtherVal('state',false,this)"
              onblur="cancelOtherInput('state')">
            <button class="other-confirm" onclick="confirmOtherVal('state',false,this.previousElementSibling)">Add</button>
          </div>
        </div>

        <!-- ══════════════════════════════════════════════════════════
             FULL LOG FIELDS (hidden in quick mode)
             ══════════════════════════════════════════════════════════ -->
        <div class="full-section" id="full-fields">
          <div class="log-step-divider">Detail</div>

          <!-- URGE BEFORE (hidden if automatic) -->
          <div class="field" id="urge-before-field">
            <label class="field-label">Urge before</label>
            <p class="field-hint">How strong was the pull right before.</p>
            <div class="slider-row">
              <input type="range" min="1" max="10" value="5" id="slider-urge-before"
                aria-label="Urge before, 1 to 10"
                oninput="updateSlider(this,'urge-before-val','urge_before','urge-before-word')">
              <div class="slider-val" id="urge-before-val" aria-live="polite">5</div>
              <div class="slider-word" id="urge-before-word"></div>
            </div>
          </div>

          <!-- TARGET TYPE -->
          <div class="field">
            <label class="field-label">What were you going for?</label>
            <div class="grid-auto" role="group" aria-label="Target type">
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Bump / texture</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Scab</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Pimple / whitehead</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Blackhead / pore</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Dry / flaky skin</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Ingrown hair</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Hangnail / cuticle</button>
              <button type="button" class="tag" onclick="toggleMulti('target',this)">Nothing specific</button>
              <button type="button" class="tag tag-other" onclick="showOther('target',this)">Other...</button>
            </div>
            <div class="other-input-wrap" id="other-target">
              <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
                onkeydown="if(event.key==='Enter')confirmOtherVal('target',true,this)"
                onblur="cancelOtherInput('target')">
              <button class="other-confirm" onclick="confirmOtherVal('target',true,this.previousElementSibling)">Add</button>
            </div>
          </div>

          <!-- MIRROR -->
          <div class="field" id="mirror-field">
            <label class="field-label">Mirror or camera?</label>
            <div class="grid-2" role="group" aria-label="Mirror use">
              <button type="button" class="tag" onclick="selectTag('mirror',this)">No mirror</button>
              <button type="button" class="tag" onclick="selectTag('mirror',this)">Regular mirror</button>
              <button type="button" class="tag" onclick="selectTag('mirror',this)">Magnifying mirror</button>
              <button type="button" class="tag" onclick="selectTag('mirror',this)">Phone camera</button>
            </div>
          </div>

          <!-- AFTERMATH (picked only) -->
          <div class="field" id="aftermath-field" style="display:none">
            <label class="field-label">Aftermath</label>
            <div class="grid-2" role="group" aria-label="Aftermath">
              <button type="button" class="tag" onclick="selectTag('aftermath',this)">Ingested / Ate it</button>
              <button type="button" class="tag" onclick="selectTag('aftermath',this)">Examined it</button>
              <button type="button" class="tag" onclick="selectTag('aftermath',this)">Discarded</button>
              <button type="button" class="tag tag-other" onclick="showOther('aftermath',this)">Other...</button>
            </div>
            <div class="other-input-wrap" id="other-aftermath">
              <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
                onkeydown="if(event.key==='Enter')confirmOtherVal('aftermath',false,this)"
                onblur="cancelOtherInput('aftermath')">
              <button class="other-confirm" onclick="confirmOtherVal('aftermath',false,this.previousElementSibling)">Add</button>
            </div>
          </div>

          <!-- DURATION (picked only) -->
          <div class="field" id="duration-field" style="display:none">
            <label class="field-label">Duration</label>
            <div class="grid-2" role="group" aria-label="Duration">
              <button type="button" class="tag" onclick="selectTag('duration',this)">< 1 min</button>
              <button type="button" class="tag" onclick="selectTag('duration',this)">1-10 min</button>
              <button type="button" class="tag" onclick="selectTag('duration',this)">10-30 min</button>
              <button type="button" class="tag" onclick="selectTag('duration',this)">30+ min</button>
            </div>
          </div>

          <!-- SESSION PATTERN (picked only) -->
          <div class="field" id="pattern-field" style="display:none">
            <label class="field-label">Session pattern</label>
            <div class="grid-auto" role="group" aria-label="Session pattern">
              <button type="button" class="tag" onclick="selectTag('pattern',this)">Single pick</button>
              <button type="button" class="tag" onclick="selectTag('pattern',this)">Short session</button>
              <button type="button" class="tag" onclick="selectTag('pattern',this)">Escalated</button>
              <button type="button" class="tag" onclick="selectTag('pattern',this)">Couldn't stop</button>
            </div>
          </div>

          <div class="log-step-divider">Context</div>

          <!-- ENVIRONMENT -->
          <div class="field">
            <label class="field-label">Environment</label>
            <div class="grid-auto" role="group" aria-label="Environment">
              <button type="button" class="tag" onclick="selectTag('environment',this)">Desk</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Couch</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Bed</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Bathroom</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Kitchen</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Around the apartment</button>
              <button type="button" class="tag" onclick="selectTag('environment',this)">Transit / Car</button>
              <button type="button" class="tag tag-other" onclick="showOther('environment',this)">Other...</button>
            </div>
            <div class="other-input-wrap" id="other-environment">
              <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
                onkeydown="if(event.key==='Enter')confirmOtherVal('environment',false,this)"
                onblur="cancelOtherInput('environment')">
              <button class="other-confirm" onclick="confirmOtherVal('environment',false,this.previousElementSibling)">Add</button>
            </div>
          </div>

          <!-- ACTIVITY -->
          <div class="field">
            <label class="field-label">Activity at the time</label>
            <div class="grid-auto" role="group" aria-label="Activity">
              <button type="button" class="tag" onclick="selectTag('activity',this)">Studying / Lecture</button>
              <button type="button" class="tag" onclick="selectTag('activity',this)">Watching TV</button>
              <button type="button" class="tag" onclick="selectTag('activity',this)">On phone</button>
              <button type="button" class="tag" onclick="selectTag('activity',this)">Getting ready</button>
              <button type="button" class="tag" onclick="selectTag('activity',this)">Working / At computer</button>
              <button type="button" class="tag" onclick="selectTag('activity',this)">Resting / Idle</button>
              <button type="button" class="tag tag-other" onclick="showOther('activity',this)">Other...</button>
            </div>
            <div class="other-input-wrap" id="other-activity">
              <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
                onkeydown="if(event.key==='Enter')confirmOtherVal('activity',false,this)"
                onblur="cancelOtherInput('activity')">
              <button class="other-confirm" onclick="confirmOtherVal('activity',false,this.previousElementSibling)">Add</button>
            </div>
          </div>

          <!-- INTERVENTIONS (what were you doing to prevent) -->
          <div class="field">
            <label class="field-label">What were you trying?</label>
            <p class="field-hint">Anything you had in place to prevent picking.</p>
            <div class="grid-auto" role="group" aria-label="Interventions">
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Long sleeves</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Thumb covers</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Pants / leggings</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Bandages</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Gloves</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Mirror removed</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Fidget / sensory toy</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Crochet / craft</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Lotion / skin care</button>
              <button type="button" class="tag" onclick="toggleMulti('interventions',this)">Nothing</button>
              <button type="button" class="tag tag-other" onclick="showOther('interventions',this)">Other...</button>
            </div>
            <div class="other-input-wrap" id="other-interventions">
              <input class="other-input" type="text" placeholder="Type and press Enter" maxlength="60"
                onkeydown="if(event.key==='Enter')confirmOtherVal('interventions',true,this)"
                onblur="cancelOtherInput('interventions')">
              <button class="other-confirm" onclick="confirmOtherVal('interventions',true,this.previousElementSibling)">Add</button>
            </div>
          </div>

          <!-- URGE AFTER -->
          <div class="field field--flush">
            <label class="field-label" id="urge-after-label">Urge after</label>
            <div class="slider-row">
              <input type="range" min="1" max="10" value="3" id="slider-urge-after"
                aria-label="Urge after, 1 to 10"
                oninput="updateSlider(this,'urge-after-val','urge_after','urge-after-word')">
              <div class="slider-val" id="urge-after-val" aria-live="polite">3</div>
              <div class="slider-word" id="urge-after-word"></div>
            </div>
          </div>

        </div><!-- /full-fields -->

        <!-- ====== NOTES (always visible) ====== -->
        <div class="field field--flush" style="margin-top:16px">
          <label class="field-label">Notes <span class="field-label__opt">(optional)</span></label>
          <textarea id="notes" placeholder="Anything worth noting..." rows="2"></textarea>
        </div>

      </div><!-- /outcome-gated -->

    </div><!-- /card -->

  </div><!-- /log-form -->

  <div class="action-bar" id="bar-save">
    <div class="action-inner">
      <button class="btn-primary inactive" id="btn-save" onclick="saveEntry()" disabled>Save</button>
    </div>
  </div>

  <div id="screen-success" class="hidden" aria-live="assertive" role="status">
    <div class="success-msg">
      <div class="success-icon" id="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title" id="success-title">Logged.</div>
      <div class="success-body" id="success-body"></div>
      <div style="width:100%;max-width:280px;margin-top:20px">
        <button class="btn-primary success-actions" onclick="resetForm()">Log another</button>
      </div>
      <div class="success-edit-wrap" style="margin-top:14px">
        <a href="tracker.html" class="success-edit-link">View in Patterns</a>
      </div>
    </div>
  </div>

</main>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="log.js"></script>
<script src="nav.js"></script>
<script src="daily-state-widget.js"></script>

</body>
</html>
