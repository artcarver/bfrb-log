<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F3" id="theme-color-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Groundwork">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Groundwork -- Offline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<script>
  const t = localStorage.getItem('gw-theme') || localStorage.getItem('theme');
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-color-meta')?.setAttribute('content', '#1a1a18');
  }
</script>
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
  }
  .offline-card {
    background: var(--card);
    border: 1px solid var(--bdr);
    border-radius: var(--rlg);
    padding: 48px 36px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: var(--s3);
  }
  @media(max-width:400px) { .offline-card { padding: 36px 24px; } }
  .offline-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--acl); color: var(--ac);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .offline-card h1 {
    font-family: 'Nunito Sans', sans-serif;
    font-size: var(--fs-h1); color: var(--tx); margin-bottom: 12px;
  }
  .offline-card p {
    font-size: var(--fs-body); color: var(--mu);
    line-height: var(--lh-body); margin-bottom: 20px;
  }
  .offline-tip {
    background: var(--sur); border: 1px solid var(--bdr);
    border-radius: var(--rsm); padding: 12px 16px;
    font-size: var(--fs-xs); color: var(--tx2);
    text-align: left; line-height: var(--lh-body); margin-bottom: 24px;
  }
  .offline-tip strong { color: var(--tx); }
  .offline-btns { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
</style>
</head>
<body>
<div class="offline-card">
  <div class="offline-icon" aria-hidden="true">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1" fill="currentColor"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Groundwork needs a connection to load your data and sync entries.</p>
  <div class="offline-tip">
    <strong>If you're managing an urge right now:</strong> the Tools page may still be
    available from cache -- try navigating there directly.
  </div>
  <div class="offline-btns">
    <button class="btn-primary" onclick="location.reload()">Try again</button>
    <a class="btn-ghost" href="interventions.html" style="text-decoration:none;text-align:center">Open Tools</a>
  </div>
</div>
</body>
</html>
