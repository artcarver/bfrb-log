<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Analyse BFRB patterns, triggers, and intervention outcomes over time.">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Groundwork">
    <link rel="apple-touch-icon" href="icon-192.png">
<title>Groundwork - Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#F4EDE3; --sur:#FAF6F1; --card:#FFFFFF; --bdr:#E2D8CE; --bdr2:#C8BAA8;
  --tx:#2C1F14; --tx2:#5C4A38; --mu:#9C8878;
  --ac:#C1694F; --ac-h:#A8573E; --acl:rgba(193,105,79,.10);
  --sage:#7A8C85; --sagel:rgba(122,140,133,.10);
  --warm:#D4956A; --warml:rgba(212,149,106,.13);
  --rsm:10px; --r:16px; --rlg:24px; --pill:100px;
  --s1:0 1px 3px rgba(44,31,20,.06); --s2:0 2px 12px rgba(44,31,20,.08);
  --tr:all .15s ease;
}
[data-theme="dark"] {
  --bg:#1E1710; --sur:#261D14; --card:#2E231A; --bdr:#3D3028; --bdr2:#5A4538;
  --tx:#F0E8DF; --tx2:#C8B8A8; --mu:#8C7868;
  --ac:#C97860; --ac-h:#D48870; --acl:rgba(201,120,96,.12);
  --sage:#8A9E96; --sagel:rgba(138,158,150,.12);
  --warm:#C4855A; --warml:rgba(196,133,90,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:60px;transition:background .3s,color .3s}

/* NAV */
nav{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(244,237,227,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
[data-theme="dark"] nav{background:rgba(30,23,16,.96)}
.nav-brand{font-family:'Lora',serif;font-size:18px;color:var(--tx);text-decoration:none}
.nav-brand span{color:var(--ac)}

.auth-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;align-items:center;justify-content:center}
.auth-screen.on{display:flex}
.auth-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rlg);padding:44px 36px;text-align:center;max-width:320px;width:92%}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--pill);padding:13px 20px;font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;margin-top:20px}

#app{display:none}
#app.on{display:block}
main{max-width:900px;margin:0 auto;padding:24px 14px}

/* HEADER & CONTROLS */
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Lora',serif;font-size:24px;color:var(--tx)}
.controls{display:flex;gap:8px;align-items:center}

.action-btn {
  padding: 8px 14px;
  border-radius: var(--pill);
  border: 1.5px solid var(--bdr);
  background: var(--card);
  color: var(--tx);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  outline: none;
  cursor: pointer;
  transition: var(--tr);
  box-shadow: var(--s1);
}
.action-btn:hover { border-color: var(--ac); color: var(--ac); }

.select-btn {
  padding: 8px 32px 8px 14px;
  border-radius: var(--pill);
  border: 1.5px solid var(--bdr);
  background-color: var(--card);
  color: var(--tx);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  outline: none;
  cursor: pointer;
  transition: var(--tr);
  box-shadow: var(--s1);
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%235C4A38' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 14px;
}
.select-btn:hover { border-color: var(--bdr2); }

[data-theme="dark"] .select-btn {
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23C8B8A8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--s1)}
.stat-val{font-family:'Lora',serif;font-size:28px;color:var(--tx);line-height:1.2}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);margin-top:4px}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:32px}
@media(min-width:640px){.chart-grid{grid-template-columns:1fr 1fr}}
.chart-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--s1)}
.chart-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:16px;text-align:center}
.chart-wrapper{position:relative;height:220px;width:100%}

/* RAW LOG FEED */
.feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:12px;border-bottom:2px solid var(--bdr);padding-bottom:12px}
.feed-title{font-family:'Lora',serif;font-size:20px;color:var(--tx)}
.feed-controls{display:flex;gap:8px;align-items:center}
.feed-toggle{background:none;border:none;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr)}
.feed-toggle:hover{color:var(--tx)}

.log-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:16px;margin-bottom:12px;box-shadow:var(--s1)}
.log-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.log-date{font-size:13px;font-weight:600;color:var(--tx2)}
.log-badge{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:var(--rsm);background:var(--sur);color:var(--mu)}
.log-badge.resisted{background:var(--sagel);color:var(--sage)}
.log-badge.near_miss{background:var(--warml);color:var(--warm)}
.log-badge.did{background:var(--acl);color:var(--ac)}

.log-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.meta-tag{background:var(--sur);padding:4px 10px;border-radius:var(--rsm);border:1px solid var(--bdr);display:inline-block;white-space:nowrap}
.meta-tag strong{color:var(--tx);font-weight:600;margin-right:4px}

.log-notes{font-size:13px;color:var(--tx);background:var(--bg);padding:12px;border-radius:var(--rsm);border:1px solid var(--bdr);line-height:1.5}
.log-actions{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)}
.log-act-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;transition:var(--tr);padding:0}
.log-act-btn:hover{color:var(--tx)}
.log-act-btn.del:hover{color:var(--ac)}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);opacity:0;background:var(--tx);border-radius:var(--pill);padding:12px 24px;font-size:13px;font-weight:600;color:#fff;transition:all .3s ease;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--ac)}
.chart-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mu);pointer-events:none;padding-top:28px}
.empty-state{text-align:center;padding:40px 20px;color:var(--mu);font-size:14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-top:20px}

/* EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(28,18,10,.6);backdrop-filter:blur(4px);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;visibility:hidden;transition:opacity .2s ease,visibility .2s ease;pointer-events:none}
.modal-overlay.on{opacity:1;visibility:visible;pointer-events:auto}
.modal-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;width:100%;max-width:400px;box-shadow:var(--s2)}
.modal-title{font-family:'Lora',serif;font-size:18px;color:var(--tx);margin-bottom:16px}
.modal-field{margin-bottom:16px}
.modal-label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.modal-input,.modal-select{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--rsm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--tx);outline:none;transition:var(--tr)}
.modal-input:focus,.modal-select:focus{border-color:var(--ac)}
.modal-actions{display:flex;gap:12px;margin-top:24px}
.modal-btn{flex:1;padding:12px;border-radius:var(--pill);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:var(--tr);border:1.5px solid var(--bdr);background:var(--card);color:var(--tx)}
.modal-btn:hover{border-color:var(--bdr2)}
.modal-btn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.modal-btn.primary:hover{background:var(--ac-h)}
</style>

    <script>
      // Keep theme-color meta in sync with colour scheme
      (function() {
        const stored = localStorage.getItem('gw-theme');
        if (stored === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          const m = document.getElementById('theme-color-meta');
          if (m) m.setAttribute('content', '#1E1710');
        }
      })();
    </script>
  </head>
<body>

<div class="auth-screen on" id="auth-screen">
  <div class="auth-card">
    <div style="font-family:'Lora',serif;font-size:24px;margin-bottom:8px">Groundwork</div>
    <div style="font-size:14px;color:var(--mu)">Sign in to view patterns.</div>
    <button class="google-btn" onclick="signInWithGoogle()">Continue with Google</button>
  </div>
</div>

<div id="gw-nav"></div>

<div id="app">
<main>
  <div class="header-row">
    <div class="page-title">Patterns</div>
    <div class="controls">
      <select class="select-btn" id="time-filter" onchange="loadData()">
        <option value="7">Last 7 Days</option>
        <option value="30" selected>Last 30 Days</option>
        <option value="all">All Time</option>
      </select>
    </div>
  </div>

  <div id="loading" style="text-align:center;color:var(--mu);padding:40px">Loading...</div>
  
  <div id="dashboard" style="display:none">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Entries</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-resist" style="color:var(--sage)">0%</div>
        <div class="stat-lbl">Resisted + Near Miss</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-urge">0</div>
        <div class="stat-lbl">Avg urge</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-since" style="color:var(--sage)">—</div>
        <div class="stat-lbl" id="stat-since-lbl">Days since episode</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Outcomes</div>
        <div class="chart-wrapper"><canvas id="chart-outcomes"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Time of day</div>
        <div class="chart-wrapper"><canvas id="chart-time"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Triggers</div>
        <div class="chart-wrapper"><canvas id="chart-triggers"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Body areas</div>
        <div class="chart-wrapper"><canvas id="chart-areas"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Target types</div>
        <div class="chart-wrapper"><canvas id="chart-targets"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Intervention effectiveness</div>
        <div class="chart-wrapper"><canvas id="chart-tools"></canvas></div>
      </div>
    </div>

    <div class="feed-header">
      <div class="feed-title">Log history</div>
      <div class="feed-controls">
        <input type="file" id="import-file" accept=".csv" style="display:none" onchange="handleImport(event)">
        <button class="action-btn" id="btn-import" onclick="triggerImport()">Import CSV</button>
        <button class="action-btn" onclick="exportCSV()">Export CSV</button>
        <button class="feed-toggle" id="feed-toggle" onclick="toggleFeed()">View All</button>
      </div>
    </div>
    <div id="log-feed"></div>

  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    No entries in this timeframe.
    <div style="margin-top:20px">
      <input type="file" id="import-file-empty" accept=".csv" style="display:none" onchange="handleImport(event)">
      <button class="action-btn" id="btn-import-empty" onclick="document.getElementById('import-file-empty').click()">Import CSV</button>
    </div>
  </div>

</main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-card">
    <div class="modal-title">Edit Log</div>
    <div class="modal-field">
      <label class="modal-label">Outcome</label>
      <select class="modal-select" id="edit-outcome">
        <option value="did">Episode</option>
        <option value="near_miss">Near Miss</option>
        <option value="resisted">Resisted</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Urge Level (1-10)</label>
      <input type="number" class="modal-input" id="edit-urge" min="1" max="10">
    </div>
    <div class="modal-field">
      <label class="modal-label">Notes</label>
      <textarea class="modal-input" id="edit-notes" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeEdit()">Cancel</button>
      <button class="modal-btn primary" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, query, where, getDocs, orderBy, deleteDoc, doc, updateDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBpLjdsDss2eI7Ku9Ak1GDhnfavJdpY8OM",
  authDomain: "skin-picking-log.firebaseapp.com",
  projectId: "skin-picking-log",
  storageBucket: "skin-picking-log.firebasestorage.app",
  messagingSenderId: "162906566118",
  appId: "1:162906566118:web:a89abbd383fc847ba97a27"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window._uid = null;
window._currentEntries = [];
let chartInstances = {};
let feedExpanded = false;
let editingId = null;

window.signInWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }};
window.signOut = async () => { await fbSignOut(auth); };

onAuthStateChanged(auth, user => {
  window._uid = user ? user.uid : null;
  document.getElementById('auth-screen').classList.toggle('on', !user);
  document.getElementById('app').classList.toggle('on', !!user);
  if (user) loadData();
});

Chart.defaults.font.family = "'DM Sans', sans-serif";

// Read CSS vars at runtime so charts respect dark/light mode
function getCSSVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
function getChartColors() {
  return {
    ac:   getCSSVar('--ac'),
    sage: getCSSVar('--sage'),
    warm: getCSSVar('--warm'),
    mu:   getCSSVar('--mu'),
  };
}
function applyChartDefaults() {
  Chart.defaults.color = getCSSVar('--mu');
}


function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
window.loadData = async () => {
  if (!window._uid) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  const days = document.getElementById('time-filter').value;
  let q;
  
  if (days === 'all') {
    q = query(collection(db, 'users', window._uid, 'entries'), orderBy('created_at', 'desc'));
  } else {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(days));
    q = query(collection(db, 'users', window._uid, 'entries'), where('created_at', '>=', cutoff), orderBy('created_at', 'desc'));
  }

  try {
    const snap = await getDocs(q);
    const entries = [];
    snap.forEach(document => {
      entries.push({ id: document.id, ...document.data() });
    });
    
    window._currentEntries = entries;

    if (entries.length === 0) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    processData(entries);
    feedExpanded = false;
    document.getElementById('feed-toggle').textContent = entries.length > 5 ? 'View All' : '';
    document.getElementById('feed-toggle').style.display = entries.length > 5 ? 'block' : 'none';
    renderFeed();

  } catch (e) {
    console.error("Error fetching logs:", e);
    document.getElementById('loading').textContent = "Error loading data. Check console.";
  }
};

function processData(entries) {
  let total = entries.length;
  let resisted = 0;
  let totalUrge = 0;
  
  let outcomes = { resisted: 0, near_miss: 0, did: 0 };
  let times = { morning: 0, afternoon: 0, evening: 0, night: 0 };
  let triggers = {};
  let tools = {};
  let areas = {};
  let targets = {};

  entries.forEach(e => {
    if (e.entry_type === 'resisted' || e.entry_type === 'near_miss') resisted++;
    if (e.urge_before) totalUrge += parseInt(e.urge_before);
    if (e.entry_type) outcomes[e.entry_type]++;

    if (e.created_at) {
      const date = e.created_at.toDate ? e.created_at.toDate() : new Date(e.created_at);
      const hour = date.getHours();
      if (hour >= 6 && hour < 12) times.morning++;
      else if (hour >= 12 && hour < 17) times.afternoon++;
      else if (hour >= 17 && hour < 22) times.evening++;
      else times.night++;
    }

    if (e.primary_trigger) triggers[e.primary_trigger] = (triggers[e.primary_trigger] || 0) + 1;
    
    if (e.body_areas) {
      e.body_areas.split(',').forEach(a => {
        const t = a.trim();
        if (t) areas[t] = (areas[t] || 0) + 1;
      });
    }

    if (e.target) {
      e.target.split(',').forEach(t => {
        const txt = t.trim();
        if (txt) targets[txt] = (targets[txt] || 0) + 1;
      });
    }

    if (e.tried_intervention && e.interventions) {
      const isWin = (e.entry_type === 'resisted' || e.entry_type === 'near_miss');
      e.interventions.split(',').forEach(tool => {
        const t = tool.trim();
        // Skip empty strings, 'nan', 'null', 'undefined' from CSV import artifacts
        if (!t || t.toLowerCase() === 'nan' || t.toLowerCase() === 'null' || t.toLowerCase() === 'undefined') return;
        if (!tools[t]) tools[t] = { attempts: 0, wins: 0 };
        tools[t].attempts++;
        if (isWin) tools[t].wins++;
      });
    }
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-resist').textContent = Math.round((resisted / total) * 100) + '%';
  document.getElementById('stat-urge').textContent = (totalUrge / total).toFixed(1);

  // Time since last episode — find most recent 'did' entry across ALL entries (not just timeframe)
  const lastEpisode = entries.filter(e => e.entry_type === 'did').map(e => {
    return e.created_at?.toDate ? e.created_at.toDate() : new Date(e.created_at);
  }).sort((a, b) => b - a)[0];
  if (lastEpisode) {
    const days = Math.floor((Date.now() - lastEpisode.getTime()) / 86400000);
    document.getElementById('stat-since').textContent = days;
    document.getElementById('stat-since-lbl').textContent = days === 0 ? 'Episode today' : 'Days since episode';
    document.getElementById('stat-since').style.color = days >= 7 ? 'var(--sage)' : 'var(--ac)';
  } else {
    document.getElementById('stat-since').textContent = '—';
  }

  renderOutcomes(outcomes);
  applyChartDefaults();
  renderTimeOfDay(times);
  renderTriggers(triggers);
  renderAreas(areas);
  renderTargets(targets);
  renderTools(tools);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function escapeHtml(unsafe) {
  return (unsafe || '').toString().replace(/[&<"']/g, function(m) {
    switch (m) {
      case '&': return '&amp;'; case '<': return '&lt;'; case '"': return '&quot;'; default: return '&#039;';
    }
  });
}

function renderFeed() {
  const container = document.getElementById('log-feed');
  const toShow = feedExpanded ? window._currentEntries : window._currentEntries.slice(0, 5);
  
  const labels = { resisted: 'Resisted', near_miss: 'Near Miss', did: 'Episode' };

  container.innerHTML = toShow.map(e => {
    const d = e.created_at?.toDate ? e.created_at.toDate() : new Date(e.created_at);
    const dateStr = d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    const outClass = e.entry_type || 'did';
    const outLabel = labels[e.entry_type] || e.entry_type;
    
    let metaHTML = `<span class="meta-tag"><strong>Urge:</strong> ${e.urge_before || 0}/10</span>`;
    if (e.bfrb_type) metaHTML += `<span class="meta-tag"><strong>Type:</strong> ${e.bfrb_type}</span>`;
    if (e.pre_action) metaHTML += `<span class="meta-tag"><strong>Pre:</strong> ${e.pre_action}</span>`;
    if (e.primary_trigger) metaHTML += `<span class="meta-tag"><strong>Trig:</strong> ${e.primary_trigger.split('/')[0]}</span>`;
    if (e.body_areas) metaHTML += `<span class="meta-tag"><strong>Where:</strong> ${e.body_areas}</span>`;
    if (e.target) metaHTML += `<span class="meta-tag"><strong>What:</strong> ${e.target}</span>`;
    if (e.awareness) metaHTML += `<span class="meta-tag"><strong>State:</strong> ${e.awareness}</span>`;
    if (e.duration) metaHTML += `<span class="meta-tag"><strong>Time:</strong> ${e.duration}</span>`;
    if (e.post_ritual) metaHTML += `<span class="meta-tag"><strong>Ritual:</strong> ${e.post_ritual}</span>`;
    if (e.post_feeling) metaHTML += `<span class="meta-tag"><strong>Felt:</strong> ${e.post_feeling.split('/')[0]}</span>`;
    if (e.tried_intervention && e.interventions) metaHTML += `<span class="meta-tag"><strong>Tool:</strong> ${e.interventions}</span>`;

    let notesHTML = e.notes ? `<div class="log-notes">${escapeHtml(e.notes)}</div>` : '';

    return `
      <div class="log-card" data-id="${e.id}">
        <div class="log-top">
          <div class="log-date">${dateStr}</div>
          <div class="log-badge ${outClass}">${outLabel}</div>
        </div>
        <div class="log-meta">${metaHTML}</div>
        ${notesHTML}
        <div class="log-actions">
          <button class="log-act-btn" onclick="editLog('${e.id}')">Edit Log</button>
          <button class="log-act-btn del" onclick="deleteLog('${e.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

window.toggleFeed = () => {
  feedExpanded = !feedExpanded;
  document.getElementById('feed-toggle').textContent = feedExpanded ? 'Show Less' : 'View All';
  renderFeed();
};

window.deleteLog = (id) => {
  // Show inline confirm inside the card
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  const actions = card.querySelector('.log-actions');
  actions.innerHTML = `
    <span style="font-size:12px;color:var(--tx2);font-weight:500">Delete this entry?</span>
    <button class="log-act-btn del" onclick="confirmDelete('${id}')">Yes, delete</button>
    <button class="log-act-btn" onclick="renderFeed()">Cancel</button>
  `;
};

window.confirmDelete = async (id) => {
  try {
    await deleteDoc(doc(db, 'users', window._uid, 'entries', id));
    window._currentEntries = window._currentEntries.filter(e => e.id !== id);
    if (window._currentEntries.length > 0) {
      processData(window._currentEntries);
    } else {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
    }
    renderFeed();
  } catch(e) {
    showToast('Failed to delete entry');
    console.error(e);
    renderFeed();
  }
};

window.editLog = (id) => {
  const entry = window._currentEntries.find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  document.getElementById('edit-outcome').value = entry.entry_type || 'did';
  document.getElementById('edit-urge').value = entry.urge_before || 5;
  document.getElementById('edit-notes').value = entry.notes || '';
  document.getElementById('edit-modal').classList.add('on');
};

window.closeEdit = () => {
  editingId = null;
  document.getElementById('edit-modal').classList.remove('on');
};

window.saveEdit = async () => {
  if (!editingId) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true;
  btn.textContent = "Saving...";

  const updates = {
    entry_type: document.getElementById('edit-outcome').value,
    urge_before: parseInt(document.getElementById('edit-urge').value),
    notes: document.getElementById('edit-notes').value.trim()
  };

  try {
    await updateDoc(doc(db, 'users', window._uid, 'entries', editingId), updates);
    const idx = window._currentEntries.findIndex(e => e.id === editingId);
    if (idx > -1) {
      window._currentEntries[idx] = { ...window._currentEntries[idx], ...updates };
    }
    processData(window._currentEntries);
    renderFeed();
    closeEdit();
  } catch(e) {
    showToast("Failed to update entry");
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = "Save Changes";
};

// --- IMPORT CSV LOGIC ---
window.triggerImport = () => {
  document.getElementById('import-file').click();
};

window.handleImport = async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const btn = document.getElementById('btn-import');
  if (btn) {
    btn.textContent = "Importing...";
    btn.disabled = true;
  }
  
  const btnEmpty = document.getElementById('btn-import-empty');
  if (btnEmpty) {
    btnEmpty.textContent = "Importing...";
    btnEmpty.disabled = true;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim() !== '');
    if (lines.length < 2) {
      showToast("File is empty or invalid", true);
      resetImportBtn();
      return;
    }

    let count = 0;
    try {
      let batch = writeBatch(db);
      let ops = 0;

      for (let i = 1; i < lines.length; i++) {
        // Splitting by comma while ignoring commas inside double quotes
        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
        if (row.length < 4) continue;

        const dateStr = row[0]; 
        const timeStr = row[1]; 
        let createdAt = new Date();
        if (dateStr && timeStr) {
          createdAt = new Date(`${dateStr} ${timeStr}`);
        }

        const docRef = doc(collection(db, 'users', window._uid, 'entries'));
        batch.set(docRef, {
          created_at: createdAt,
          bfrb_type: row[2] || 'picking',
          entry_type: row[3] || 'did',
          urge_before: parseInt(row[4]) || 5,
          body_areas: row[5] || '',
          target: row[6] || '',
          awareness: row[7] || '',
          duration: row[8] || '',
          post_ritual: row[9] || '',
          pre_action: row[10] || '',
          primary_trigger: row[11] || '',
          environment: row[12] || '',
          post_feeling: row[13] || '',
          interventions: (row[14] && row[14].toLowerCase() !== 'nan') ? row[14] : '',
          tried_intervention: !!(row[14] && row[14].toLowerCase() !== 'nan'),
          intervention_effectiveness: row[15] ? parseInt(row[15]) : null,
          notes: row[16] || ''
        });
        
        count++;
        ops++;
        
        if (ops === 450) { 
           await batch.commit();
           batch = writeBatch(db);
           ops = 0;
        }
      }
      
      if (ops > 0) {
        await batch.commit();
      }
      
      showToast(`Imported ${count} entries`);
      loadData(); 
    } catch(err) {
       console.error(err);
       showToast("Import failed — check file format", true);
    }
    resetImportBtn();
  };
  reader.readAsText(file);
};

function resetImportBtn() {
  const btn = document.getElementById('btn-import');
  if (btn) { btn.textContent = "Import CSV"; btn.disabled = false; }
  const btnEmpty = document.getElementById('btn-import-empty');
  if (btnEmpty) { btnEmpty.textContent = "Import CSV"; btnEmpty.disabled = false; }
  
  const f1 = document.getElementById('import-file');
  if (f1) f1.value = "";
  const f2 = document.getElementById('import-file-empty');
  if (f2) f2.value = "";
}

window.exportCSV = () => {
  const entries = window._currentEntries;
  if (!entries || entries.length === 0) {
    showToast("No data in this timeframe");
    return;
  }

  const headers = [
    "Date", "Time", "Behavior", "Outcome", "Urge_Level", 
    "Area", "Target", "Awareness", "Duration", "Post_Ritual", 
    "Pre_Action", "Trigger", "Environment", "Post_Feeling", 
    "Interventions_Tried", "Effectiveness", "Notes"
  ];

  let csvContent = headers.join(",") + "\n";

  entries.forEach(e => {
    let d = e.created_at?.toDate ? e.created_at.toDate() : new Date(e.created_at);
    let dateStr = d.toLocaleDateString('en-US');
    let timeStr = d.toLocaleTimeString('en-US');

    const row = [
      dateStr, timeStr, e.bfrb_type || '', e.entry_type || '', e.urge_before || '',
      e.body_areas || '', e.target || '', e.awareness || '', e.duration || '', e.post_ritual || '',
      e.pre_action || '', e.primary_trigger || '', e.environment || '', e.post_feeling || '',
      e.interventions || '', e.intervention_effectiveness || '',
      e.notes ? e.notes.replace(/"/g, '""').replace(/\n/g, ' ') : ''
    ];

    csvContent += row.map(v => `"${v}"`).join(",") + "\n";
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `BFRB_Log_Export_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// Re-render charts when theme changes so colors update
const themeObserver = new MutationObserver(() => {
  if (window._currentEntries && window._currentEntries.length > 0) {
    applyChartDefaults();
    processData(window._currentEntries);
  }
});
themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });


function setChartEmpty(id, isEmpty, msg) {
  const card = document.getElementById(id)?.closest('.chart-card');
  if (!card) return;
  let overlay = card.querySelector('.chart-empty');
  if (isEmpty) {
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.className = 'chart-empty';
      card.style.position = 'relative';
      card.appendChild(overlay);
    }
    overlay.textContent = msg || 'No data logged yet';
  } else {
    if (overlay) overlay.remove();
  }
}
function destroyChart(id) {
  if (chartInstances[id]) chartInstances[id].destroy();
}

  destroyChart('chart-outcomes');

  const ctx = document.getElementById('chart-outcomes').getContext('2d');
  chartInstances['chart-outcomes'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Resisted', 'Near Miss', 'Episode'],
      datasets: [{
        data: [data.resisted, data.near_miss, data.did],
        backgroundColor: [colors.sage, colors.warm, colors.ac],
        borderWidth: 0
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
  });
}

function renderTools(data) {
  destroyChart('chart-tools');
  const colors = getChartColors();
  const sorted = Object.entries(data)
    .filter(i => i[1].attempts > 0 && i[0] && i[0].toLowerCase() !== 'nan')
    .map(i => [i[0], Math.round((i[1].wins / i[1].attempts) * 100) || 0])
    .sort((a,b) => b[1] - a[1])
    .slice(0, 5);

  if (sorted.length === 0) { setChartEmpty('chart-tools', true, 'No intervention data yet'); return; }
  setChartEmpty('chart-tools', false);
  const ctx = document.getElementById('chart-tools').getContext('2d');
  chartInstances['chart-tools'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(i => i[0]),
