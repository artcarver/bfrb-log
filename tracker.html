<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groundwork - Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#F4EDE3; --sur:#FAF6F1; --card:#FFFFFF; --bdr:#E2D8CE; --bdr2:#C8BAA8;
  --tx:#2C1F14; --tx2:#5C4A38; --mu:#9C8878;
  --ac:#C1694F; --ac-h:#A8573E; --acl:rgba(193,105,79,.10);
  --sage:#7A8C85; --sagel:rgba(122,140,133,.10);
  --warm:#D4956A; --warml:rgba(212,149,106,.13);
  --rsm:10px; --r:16px; --rlg:24px; --pill:100px;
  --s1:0 1px 3px rgba(44,31,20,.06); --s2:0 2px 12px rgba(44,31,20,.08);
  --tr:all .15s ease;
}
[data-theme="dark"] {
  --bg:#1E1710; --sur:#261D14; --card:#2E231A; --bdr:#3D3028; --bdr2:#5A4538;
  --tx:#F0E8DF; --tx2:#C8B8A8; --mu:#8C7868;
  --ac:#C97860; --ac-h:#D48870; --acl:rgba(201,120,96,.12);
  --sage:#8A9E96; --sagel:rgba(138,158,150,.12);
  --warm:#C4855A; --warml:rgba(196,133,90,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:60px;transition:background .3s,color .3s}

nav{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(244,237,227,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
[data-theme="dark"] nav{background:rgba(30,23,16,.96)}
.nav-brand{font-family:'Lora',serif;font-size:18px;color:var(--tx);text-decoration:none}
.nav-brand span{color:var(--ac)}

.auth-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;align-items:center;justify-content:center}
.auth-screen.on{display:flex}
.auth-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rlg);padding:44px 36px;text-align:center;max-width:320px;width:92%}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--pill);padding:13px 20px;font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;margin-top:20px}

#app{display:none}
#app.on{display:block}
main{max-width:800px;margin:0 auto;padding:24px 14px}

.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-family:'Lora',serif;font-size:24px;color:var(--tx)}
.time-filter{padding:6px 12px;border-radius:var(--pill);border:1px solid var(--bdr);background:var(--sur);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--s1)}
.stat-val{font-family:'Lora',serif;font-size:28px;color:var(--ac);line-height:1.2}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);margin-top:4px}

.chart-grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:600px){.chart-grid{grid-template-columns:1fr 1fr}}

.chart-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--s1)}
.chart-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:16px;text-align:center}
.chart-wrapper{position:relative;height:220px;width:100%}

.empty-state{text-align:center;padding:40px 20px;color:var(--mu);font-size:14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-top:20px}
</style>
</head>
<body>

<div class="auth-screen on" id="auth-screen">
  <div class="auth-card">
    <div style="font-family:'Lora',serif;font-size:24px;margin-bottom:8px">Groundwork</div>
    <div style="font-size:14px;color:var(--mu)">Sign in to view patterns.</div>
    <button class="google-btn" onclick="signInWithGoogle()">Continue with Google</button>
  </div>
</div>

<div id="gw-nav"></div>

<div id="app">
<main>
  <div class="header-row">
    <div class="page-title">Clinical Patterns</div>
    <select class="time-filter" id="time-filter" onchange="loadData()">
      <option value="7">Last 7 Days</option>
      <option value="30" selected>Last 30 Days</option>
      <option value="all">All Time</option>
    </select>
  </div>

  <div id="loading" style="text-align:center;color:var(--mu);padding:40px">Analyzing logs...</div>
  
  <div id="dashboard" style="display:none">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Total Logs</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-resist" style="color:var(--sage)">0%</div>
        <div class="stat-lbl">Resist / Near Miss Rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-urge">0</div>
        <div class="stat-lbl">Avg Urge Level</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Outcomes</div>
        <div class="chart-wrapper"><canvas id="chart-outcomes"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">High-Risk Windows (Time of Day)</div>
        <div class="chart-wrapper"><canvas id="chart-time"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Primary Triggers</div>
        <div class="chart-wrapper"><canvas id="chart-triggers"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Intervention Win Rate</div>
        <div class="chart-wrapper"><canvas id="chart-tools"></canvas></div>
      </div>
    </div>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    Not enough data in this timeframe. Log more events to generate clinical patterns.
  </div>

</main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBpLjdsDss2eI7Ku9Ak1GDhnfavJdpY8OM",
  authDomain: "skin-picking-log.firebaseapp.com",
  projectId: "skin-picking-log",
  storageBucket: "skin-picking-log.firebasestorage.app",
  messagingSenderId: "162906566118",
  appId: "1:162906566118:web:a89abbd383fc847ba97a27"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window._uid = null;
let chartInstances = {};

window.signInWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }};
window.signOut = async () => { await fbSignOut(auth); };

onAuthStateChanged(auth, user => {
  window._uid = user ? user.uid : null;
  document.getElementById('auth-screen').classList.toggle('on', !user);
  document.getElementById('app').classList.toggle('on', !!user);
  if (user) loadData();
});

// Set global chart defaults based on theme
Chart.defaults.color = '#9C8878';
Chart.defaults.font.family = "'DM Sans', sans-serif";

window.loadData = async () => {
  if (!window._uid) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  const days = document.getElementById('time-filter').value;
  let q;
  
  if (days === 'all') {
    q = query(collection(db, 'users', window._uid, 'entries'), orderBy('created_at', 'desc'));
  } else {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(days));
    q = query(collection(db, 'users', window._uid, 'entries'), where('created_at', '>=', cutoff), orderBy('created_at', 'desc'));
  }

  try {
    const snap = await getDocs(q);
    const entries = [];
    snap.forEach(doc => entries.push(doc.data()));
    
    if (entries.length === 0) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    processData(entries);
  } catch (e) {
    console.error("Error fetching logs:", e);
    document.getElementById('loading').textContent = "Error loading data. Check console.";
  }
};

function processData(entries) {
  let total = entries.length;
  let resisted = 0;
  let totalUrge = 0;
  
  let outcomes = { resisted: 0, near_miss: 0, did: 0 };
  let times = { morning: 0, afternoon: 0, evening: 0, night: 0 };
  let triggers = {};
  let tools = {};

  entries.forEach(e => {
    // Top line stats
    if (e.entry_type === 'resisted' || e.entry_type === 'near_miss') resisted++;
    if (e.urge_before) totalUrge += e.urge_before;

    // Outcomes
    if (e.entry_type) outcomes[e.entry_type]++;

    // Time of Day (Morning 6-12, Afternoon 12-17, Evening 17-22, Night 22-6)
    if (e.created_at) {
      const date = e.created_at.toDate ? e.created_at.toDate() : new Date(e.created_at);
      const hour = date.getHours();
      if (hour >= 6 && hour < 12) times.morning++;
      else if (hour >= 12 && hour < 17) times.afternoon++;
      else if (hour >= 17 && hour < 22) times.evening++;
      else times.night++;
    }

    // Triggers
    if (e.primary_trigger) {
      triggers[e.primary_trigger] = (triggers[e.primary_trigger] || 0) + 1;
    }

    // Tools & Effectiveness
    if (e.tried_intervention && e.interventions) {
      const isWin = (e.entry_type === 'resisted' || e.entry_type === 'near_miss');
      e.interventions.split(',').forEach(tool => {
        const t = tool.trim();
        if (!tools[t]) tools[t] = { attempts: 0, wins: 0 };
        tools[t].attempts++;
        if (isWin) tools[t].wins++;
      });
    }
  });

  // Update UI Stats
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-resist').textContent = Math.round((resisted / total) * 100) + '%';
  document.getElementById('stat-urge').textContent = (totalUrge / total).toFixed(1);

  // Render Charts
  renderOutcomes(outcomes);
  renderTimeOfDay(times);
  renderTriggers(triggers);
  renderTools(tools);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function destroyChart(id) {
  if (chartInstances[id]) chartInstances[id].destroy();
}

const colors = {
  ac: '#C1694F',
  sage: '#7A8C85',
  warm: '#D4956A',
  mu: '#9C8878',
  bdr: '#E2D8CE'
};

function renderOutcomes(data) {
  destroyChart('chart-outcomes');
  const ctx = document.getElementById('chart-outcomes').getContext('2d');
  chartInstances['chart-outcomes'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Resisted', 'Near Miss', 'Did it'],
      datasets: [{
        data: [data.resisted, data.near_miss, data.did],
        backgroundColor: [colors.sage, colors.warm, colors.ac],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      cutout: '70%'
    }
  });
}

function renderTimeOfDay(data) {
  destroyChart('chart-time');
  const ctx = document.getElementById('chart-time').getContext('2d');
  chartInstances['chart-time'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Morning', 'Afternoon', 'Evening', 'Night'],
      datasets: [{
        label: 'Episodes',
        data: [data.morning, data.afternoon, data.evening, data.night],
        backgroundColor: colors.mu,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderTriggers(data) {
  destroyChart('chart-triggers');
  const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]).slice(0, 5);
  const ctx = document.getElementById('chart-triggers').getContext('2d');
  chartInstances['chart-triggers'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(i => i[0].split('/')[0].trim()), // Shorten label
      datasets: [{
        data: sorted.map(i => i[1]),
        backgroundColor: colors.warm,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { grid: { display: false } }
      }
    }
  });
}

function renderTools(data) {
  destroyChart('chart-tools');
  // Calculate win rate percentage
  const sorted = Object.entries(data)
    .filter(i => i[1].attempts > 0)
    .map(i => [i[0], Math.round((i[1].wins / i[1].attempts) * 100)])
    .sort((a,b) => b[1] - a[1])
    .slice(0, 5);

  const ctx = document.getElementById('chart-tools').getContext('2d');
  chartInstances['chart-tools'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(i => i[0]),
      datasets: [{
        label: 'Win Rate %',
        data: sorted.map(i => i[1]),
        backgroundColor: colors.sage,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { 
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => ctx.raw + '% success' } }
      },
      scales: {
        x: { max: 100, beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { grid: { display: false } }
      }
    }
  });
}
</script>
<script src="nav.js"></script>
</body>
</html>
